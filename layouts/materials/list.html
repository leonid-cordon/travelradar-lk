{{ define "main" }}
<style>
    .page-header {
        padding: 64px 0 48px;
        text-align: center;
        background: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
    }

    .materials-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 32px;
        padding: 64px 0;
    }
</style>

<div class="page-header">
    <div class="container">
        <h1>{{ .Title }}</h1>
        <p class="section-subtitle">{{ .Description }}</p>
    </div>
</div>

<section class="section">
    <div class="container">
        <div class="materials-grid">
            <div class="card">
                <div style="font-size: 48px; text-align: center; margin-bottom: 16px;">🎥</div>
                <h3 class="card-title">YouTube Shorts</h3>
                <p class="card-text">Короткие разборы: Египет, перелёты, ошибки туристов</p>
                <a href="{{ " /materials/shorts/" | relURL }}" class="btn btn-primary btn-sm">Смотреть</a>
            </div>

            <div class="card">
                <div style="font-size: 48px; text-align: center; margin-bottom: 16px;">✉️</div>
                <h3 class="card-title">Telegram</h3>
                <p class="card-text">Шпаргалки, ссылки и обновления по странам</p>
                <a href="{{ " /materials/telegram/" | relURL }}" class="btn btn-primary btn-sm">Подписаться</a>
            </div>

            <div class="card">
                <div style="font-size: 48px; text-align: center; margin-bottom: 16px;">🌍</div>
                <h3 class="card-title">По странам</h3>
                <p class="card-text">Гайды и материалы по популярным направлениям</p>
                <a href="{{ " /countries/" | relURL }}" class="btn btn-primary btn-sm">Все страны</a>
            </div>
        </div>
    </div>
</section>

{{ end }}
