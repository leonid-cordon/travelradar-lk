{{ define "main" }}
<style>
    .material-header {
        padding: 64px 0;
        background: linear-gradient(135deg, #0F3460 0%, #1A4D7C 100%);
        color: white;
        text-align: center;
    }

    .material-header h1 {
        color: white;
    }

    .material-content {
        max-width: 900px;
        margin: 0 auto;
        padding: 64px 0;
    }

    .content-section {
        background: white;
        border-radius: 16px;
        padding: 40px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        margin-bottom: 32px;
    }

    .cta-button-center {
        text-align: center;
        margin: 32px 0;
    }

    .example-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 24px;
        margin-top: 32px;
    }

    .example-card {
        background: #F8FAFC;
        border-radius: 12px;
        padding: 24px;
        text-align: center;
        border: 2px dashed #CBD5E1;
    }
</style>

<div class="material-header">
    <div class="container">
        <h1>{{ .Title }}</h1>
        <p style="font-size: 18px; color: rgba(255,255,255,0.9);">{{ .Description }}</p>
    </div>
</div>

<section class="section">
    <div class="container">
        <div class="material-content">
            <div class="content-section">
                {{ .Content }}
            </div>

            {{ if .Params.telegramLink }}
            <div class="cta-button-center">
                <a href="{{ .Params.telegramLink }}" target="_blank" rel="noopener" class="btn btn-accent">
                    Подписаться на Telegram
                </a>
            </div>
            {{ end }}
        </div>
    </div>
</section>

{{ end }}
